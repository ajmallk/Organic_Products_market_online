services:
  # Backend Service
  - type: web
    plan: free
    name: organic-product-backend
    env: python

    buildCommand: pip install -r requirements.txt

    startCommand: gunicorn backend.wsgi:application

    envVars:
      - key: PYTHON_VERSION
        value: 3.10.12

      - key: DEBUG
        value: "False"

      - key: SECRET_KEY
        generateValue: true

      - key: ALLOWED_HOSTS
        value: "*"

      - key: DATABASE_URL
        sync: false

      - key: JWT_ACCESS_TOKEN_LIFETIME_DAYS
        value: "1"

      - key: JWT_REFRESH_TOKEN_LIFETIME_DAYS
        value: "7"

  # Frontend Service
  - type: web
    plan: free
    name: organic-product-frontend
    env: static

    buildCommand: cd frontend && npm install && npm run build

    staticPublishPath: frontend/dist

    envVars:
      - key: VITE_API_URL
        value: https://organic-product-backend.onrender.com/api

      - key: VITE_SUPABASE_URL
        sync: false

      - key: VITE_SUPABASE_ANON_KEY
        sync: false

    routes:
      - type: rewrite
        source: /*
        destination: /index.html
